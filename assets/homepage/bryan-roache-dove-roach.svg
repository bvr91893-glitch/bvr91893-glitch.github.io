  <text x="298" y="326" text-anchor="middle" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="96" font-weight="800">Brian V.</text>
  <text x="902" y="326" text-anchor="middle" fill="#171717" font-family="Montserrat, Arial, sans-serif" font-size="104" font-weight="800">Roache</text>

  <g filter="url(#softShadow)">
