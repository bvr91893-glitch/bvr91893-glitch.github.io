<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Brian V. Roache red and gold hero image</title>
  <desc id="desc">A split red and gold name graphic reading Brian V. Roache, with a flying white dove above a multimedia web player.</desc>
  <defs>
    <linearGradient id="redPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b31f2a"/>
      <stop offset="1" stop-color="#6f1018"/>
    </linearGradient>
    <linearGradient id="goldPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd35a"/>
      <stop offset="1" stop-color="#b77a00"/>
    </linearGradient>
    <linearGradient id="playerFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dce9ef"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="620" fill="#151515"/>
  <rect x="28" y="28" width="572" height="564" rx="38" fill="url(#redPanel)"/>
  <rect x="600" y="28" width="572" height="564" rx="38" fill="url(#goldPanel)"/>
  <rect x="582" y="28" width="36" height="564" fill="#151515"/>

